    <!-- Theme bootstrap: avoid FOUC -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = stored || (prefersLight ? 'light' : 'dark');
          if (theme === 'light') document.documentElement.classList.add('light');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Cloudflare Web Analytics (privacy-friendly, cookie-less) -->
    <!-- Replace {{CF_ANALYTICS_TOKEN}} with the token from Cloudflare dashboard → Analytics → Web Analytics after deploy -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "{{CF_ANALYTICS_TOKEN}}"}'></script>
  </body>
